name: sozu_cliente_app
description: "SOZU — Portal del Cliente (Flutter multiplataforma)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.0
  flutter_dotenv: ^5.2.1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  intl: ^0.20.0
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  photo_view: ^0.15.0
  pdfx: ^2.9.2
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    # NOTA: no usar un archivo con punto inicial (.env) como asset — Flutter lo
    # excluye del AssetManifest en el build web release y dotenv falla (pantalla
    # blanca). Se usa assets/env (sin punto). El archivo está gitignored.
    - assets/env
