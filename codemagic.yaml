# CI/CD Codemagic — SOZU Portal del Cliente (Flutter)
# ---------------------------------------------------------------------------
# Variables Supabase: inline en `vars` (abajo). Son valores PÚBLICOS por
# diseño (URL + anon key van embebidos en cualquier app cliente; la seguridad
# real está en las Edge Functions/RLS) y el repo es privado. NUNCA poner aquí
# service_role ni credenciales de BD. El script "Crear .env" las vuelca al
# archivo que flutter_dotenv carga como asset (el .env NUNCA se commitea).
#
# Requisitos de configuración en la UI de Codemagic (una sola vez):
# 1. Android: keystore subido en Codemagic → Code signing identities, con
#    reference name "sozu_keystore" (Codemagic puede generarlo).
# 2. iOS: integración App Store Connect (API key) con nombre
#    "sozu_app_store_connect" + certificados automáticos.
# ---------------------------------------------------------------------------

definitions:
  supabase_env: &supabase_env
    SUPABASE_URL: https://tzmhgfjmddkfyffkkmto.supabase.co
    SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6bWhnZmptZGRrZnlmZmtrbXRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTczNTU0NDUsImV4cCI6MjA3MjkzMTQ0NX0.8DaFtWO6zyJg14jFo_Zm2idYKwI-mvfmUtlixG2JDSE
  env_setup: &env_setup
    name: Crear assets/env desde variables de entorno
    script: |
      mkdir -p assets
      cat > assets/env <<EOF
      SUPABASE_URL=$SUPABASE_URL
      SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
      EOF
  build_stamp: &build_stamp
    name: Timestamp de versión (hora México, estilo sozu-admin)
    script: |
      echo "BUILD_TIMESTAMP=$(TZ=America/Mexico_City date +%y%m%d.%H%M)" >> $CM_ENV
  # Keystore subido desde el dashboard (variables cifradas del grupo
  # android_signing_custom). Reconstruye el .jks y exporta las CM_KEYSTORE_*
  # que lee build.gradle.kts. Si sigue en PENDIENTE, aborta con mensaje claro.
  dashboard_keystore: &dashboard_keystore
    name: Preparar keystore (dashboard)
    script: |
      if [ -z "${ANDROID_KEYSTORE_B64:-}" ] || [ "$ANDROID_KEYSTORE_B64" = "PENDIENTE" ]; then
        echo "ERROR: keystore no configurado. Súbelo desde el dashboard (Deploy App → Keystore Android → subir)."
        exit 1
      fi
      echo "$ANDROID_KEYSTORE_B64" | base64 --decode > /tmp/dashboard.keystore
      {
        echo "CM_KEYSTORE_PATH=/tmp/dashboard.keystore"
        echo "CM_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
        echo "CM_KEY_ALIAS=$ANDROID_KEY_ALIAS"
        echo "CM_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
      } >> $CM_ENV
      echo "Keystore del dashboard listo (alias: $ANDROID_KEY_ALIAS)" 

workflows:
  android-release:
    name: Android (.apk pruebas + .aab Play Store)
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      groups:
        - android_signing_custom
      vars:
        <<: *supabase_env
      flutter: stable
    scripts:
      - *env_setup
      - *build_stamp
      - *dashboard_keystore
      - name: Dependencias y análisis
        script: |
          flutter pub get
          flutter analyze
      - name: Build APK (pruebas en dispositivo)
        script: |
          flutter build apk --release \
            --dart-define=BUILD_TIMESTAMP=$BUILD_TIMESTAMP \
            --dart-define=APP_ENV=prod
      - name: Build AAB (Google Play)
        script: |
          flutter build appbundle --release \
            --dart-define=BUILD_TIMESTAMP=$BUILD_TIMESTAMP \
            --dart-define=APP_ENV=prod
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
    # Solo construye. La publicación a Google Play vive en `android-publish`.

  # Construye el .aab Y lo publica en Google Play (track internal).
  # Requiere el service account de Play Console configurado en Codemagic
  # (env var GCLOUD_SERVICE_ACCOUNT_CREDENTIALS); sin él, el build falla.
  android-publish:
    name: Android → Play Store (internal)
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      groups:
        - android_signing_custom
      vars:
        <<: *supabase_env
      flutter: stable
    scripts:
      - *env_setup
      - *build_stamp
      - *dashboard_keystore
      - name: Dependencias y análisis
        script: |
          flutter pub get
          flutter analyze
      - name: Build AAB (Google Play)
        script: |
          flutter build appbundle --release \
            --dart-define=BUILD_TIMESTAMP=$BUILD_TIMESTAMP
    artifacts:
      - build/app/outputs/bundle/release/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal

  ios-release:
    name: iOS (.ipa — solo artefacto)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: sozu_app_store_connect
    environment:
      vars:
        <<: *supabase_env
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sozu.sozuClienteApp
      flutter: stable
    scripts:
      - *env_setup
      - *build_stamp
      - name: Dependencias y análisis
        script: |
          flutter pub get
          flutter analyze
      - name: Build IPA firmado
        script: |
          flutter build ipa --release \
            --dart-define=BUILD_TIMESTAMP=$BUILD_TIMESTAMP \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    # Solo construye. El envío a TestFlight vive en `ios-publish`.

  # Construye el .ipa Y lo envía a TestFlight.
  ios-publish:
    name: iOS → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: sozu_app_store_connect
    environment:
      vars:
        <<: *supabase_env
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sozu.sozuClienteApp
      flutter: stable
    scripts:
      - *env_setup
      - *build_stamp
      - name: Dependencias y análisis
        script: |
          flutter pub get
          flutter analyze
      - name: Build IPA firmado
        script: |
          flutter build ipa --release \
            --dart-define=BUILD_TIMESTAMP=$BUILD_TIMESTAMP \
            --dart-define=APP_ENV=prod \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  # Promueve el ÚLTIMO build ya subido a TestFlight hacia revisión de App
  # Store (sin reconstruir). Requiere RELEASE_NOTES (lo pasa el dashboard).
  ios-appstore:
    name: iOS → App Store (promover desde TestFlight)
    max_build_duration: 20
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: sozu_app_store_connect
    scripts:
      - name: Validar release notes
        script: |
          if [ -z "${RELEASE_NOTES:-}" ]; then
            echo "ERROR: falta RELEASE_NOTES (comentario obligatorio de la actualización)."
            exit 1
          fi
          echo "Release notes: $RELEASE_NOTES"
      - name: Promover último build de TestFlight a App Store
        script: |
          set -e
          APP_ID=$(app-store-connect apps list \
            --bundle-id-identifier com.sozu.sozuClienteApp --json | jq -r '.[0].id')
          echo "Apple app id: $APP_ID"
          BUILD_ID=$(app-store-connect builds list \
            --app-id "$APP_ID" --processing-state VALID --limit 1 --json | jq -r '.[0].id')
          echo "Build a promover: $BUILD_ID"
          app-store-connect builds submit-to-app-store "$BUILD_ID" \
            --release-type AFTER_APPROVAL \
            --whats-new "$RELEASE_NOTES"

  # Promueve el release del track internal a production en Google Play.
  # Requiere RELEASE_NOTES (trazabilidad; Play Console toma las notas del
  # release — editarlas ahí si se requiere ajustar) y el service account
  # GCLOUD_SERVICE_ACCOUNT_CREDENTIALS configurado en Codemagic.
  android-production:
    name: Android → Play Store (producción)
    max_build_duration: 15
    instance_type: mac_mini_m2
    environment:
      vars:
        # Package/applicationId de la app en Google Play. Debe coincidir con
        # `sozu.applicationId` de android/gradle.properties (el que lleva el
        # AAB). Este es el DEFAULT para builds disparados sin la env var; si el
        # dashboard dispara el build, inyecta ANDROID_PACKAGE_NAME vía API y ese
        # valor tiene prioridad (sobreescribe este).
        ANDROID_PACKAGE_NAME: com.sozu.clientes_app
    scripts:
      - name: Validar release notes
        script: |
          if [ -z "${RELEASE_NOTES:-}" ]; then
            echo "ERROR: falta RELEASE_NOTES (comentario obligatorio de la actualización)."
            exit 1
          fi
          echo "Release notes: $RELEASE_NOTES"
      - name: Promover internal → production
        script: |
          google-play tracks promote-release \
            --package-name "$ANDROID_PACKAGE_NAME" \
            --source-track internal \
            --target-track production \
            --credentials "@env:GCLOUD_SERVICE_ACCOUNT_CREDENTIALS"

  # Sincroniza la lista de testers del dashboard con el grupo externo de
  # TestFlight "SOZU Testers" (lo crea si no existe). Lo dispara el dashboard
  # al agregar/quitar correos, pasando TESTER_EMAILS separados por coma.
  # Deja el grupo EXACTAMENTE igual a la lista (agrega faltantes, quita sobrantes).
  sync-testflight-testers:
    name: Sync testers → TestFlight
    max_build_duration: 15
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: sozu_app_store_connect
    scripts:
      - name: Sincronizar testers con TestFlight
        script: |
          set -euo pipefail
          if [ -z "${TESTER_EMAILS:-}" ]; then
            echo "ERROR: falta TESTER_EMAILS (lista separada por comas)."
            exit 1
          fi
          pip3 install --quiet pyjwt cryptography requests
          python3 <<'PY'
          import os, time, jwt, requests

          ISSUER = os.environ["APP_STORE_CONNECT_ISSUER_ID"]
          KEY_ID = os.environ["APP_STORE_CONNECT_KEY_IDENTIFIER"]
          PRIVATE_KEY = os.environ["APP_STORE_CONNECT_PRIVATE_KEY"]
          BUNDLE_ID = "com.sozu.sozuClienteApp"
          GROUP_NAME = "SOZU Testers"
          desired = {e.strip().lower() for e in os.environ["TESTER_EMAILS"].split(",") if e.strip()}

          token = jwt.encode(
              {"iss": ISSUER, "iat": int(time.time()), "exp": int(time.time()) + 1200,
               "aud": "appstoreconnect-v1"},
              PRIVATE_KEY, algorithm="ES256", headers={"kid": KEY_ID})
          API = "https://api.appstoreconnect.apple.com/v1"
          H = {"Authorization": f"Bearer {token}"}
          HJ = {**H, "Content-Type": "application/json"}

          r = requests.get(f"{API}/apps", headers=H, params={"filter[bundleId]": BUNDLE_ID})
          r.raise_for_status()
          app_id = r.json()["data"][0]["id"]

          r = requests.get(f"{API}/betaGroups", headers=H,
                           params={"filter[app]": app_id, "filter[name]": GROUP_NAME})
          r.raise_for_status()
          groups = r.json()["data"]
          if groups:
              gid = groups[0]["id"]
          else:
              r = requests.post(f"{API}/betaGroups", headers=HJ, json={"data": {
                  "type": "betaGroups",
                  "attributes": {"name": GROUP_NAME},
                  "relationships": {"app": {"data": {"type": "apps", "id": app_id}}}}})
              r.raise_for_status()
              gid = r.json()["data"]["id"]
              print(f"Grupo '{GROUP_NAME}' creado.")

          current = {}
          url = f"{API}/betaGroups/{gid}/betaTesters?limit=200"
          while url:
              r = requests.get(url, headers=H)
              r.raise_for_status()
              d = r.json()
              for t in d["data"]:
                  em = (t["attributes"].get("email") or "").lower()
                  if em:
                      current[em] = t["id"]
              url = d.get("links", {}).get("next")

          errores = 0
          for em in sorted(desired - set(current)):
              r = requests.post(f"{API}/betaTesters", headers=HJ, json={"data": {
                  "type": "betaTesters",
                  "attributes": {"email": em},
                  "relationships": {"betaGroups": {"data": [{"type": "betaGroups", "id": gid}]}}}})
              if r.status_code >= 400:
                  print(f"ERROR al agregar {em}: {r.text}")
                  errores += 1
              else:
                  print(f"+ {em} (invitado)")

          extras = {em: tid for em, tid in current.items() if em not in desired}
          if extras:
              r = requests.delete(f"{API}/betaGroups/{gid}/relationships/betaTesters",
                                  headers=HJ,
                                  json={"data": [{"type": "betaTesters", "id": t} for t in extras.values()]})
              if r.status_code >= 400:
                  print(f"ERROR al quitar testers: {r.text}")
                  errores += 1
              else:
                  for em in extras:
                      print(f"- {em} (removido)")

          print(f"Sync terminado: {len(desired)} testers en '{GROUP_NAME}'.")
          raise SystemExit(1 if errores else 0)
          PY

  web-release:
    name: Web (build estático para hosting)
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      vars:
        <<: *supabase_env
      flutter: stable
    scripts:
      - *env_setup
      - *build_stamp
      - name: Dependencias y análisis
        script: |
          flutter pub get
          flutter analyze
      - name: Build web
        script: |
          flutter build web --release \
            --dart-define=BUILD_TIMESTAMP=$BUILD_TIMESTAMP \
            --dart-define=APP_ENV=prod
      - name: Empaquetar
        script: |
          cd build/web && zip -r ../web-release.zip .
    artifacts:
      - build/web-release.zip
