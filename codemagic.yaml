# CI/CD Codemagic — SOZU Portal del Cliente (Flutter)
# ---------------------------------------------------------------------------
# Variables Supabase: inline en `vars` (abajo). Son valores PÚBLICOS por
# diseño (URL + anon key van embebidos en cualquier app cliente; la seguridad
# real está en las Edge Functions/RLS) y el repo es privado. NUNCA poner aquí
# service_role ni credenciales de BD. El script "Crear .env" las vuelca al
# archivo que flutter_dotenv carga como asset (el .env NUNCA se commitea).
#
# Requisitos de configuración en la UI de Codemagic (una sola vez):
# 1. Android: keystore subido en Codemagic → Code signing identities, con
#    reference name "sozu_keystore" (Codemagic puede generarlo).
# 2. iOS: integración App Store Connect (API key) con nombre
#    "sozu_app_store_connect" + certificados automáticos.
# ---------------------------------------------------------------------------

definitions:
  supabase_env: &supabase_env
    SUPABASE_URL: https://tzmhgfjmddkfyffkkmto.supabase.co
    SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6bWhnZmptZGRrZnlmZmtrbXRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTczNTU0NDUsImV4cCI6MjA3MjkzMTQ0NX0.8DaFtWO6zyJg14jFo_Zm2idYKwI-mvfmUtlixG2JDSE
  env_setup: &env_setup
    name: Crear assets/env desde variables de entorno
    script: |
      mkdir -p assets
      cat > assets/env <<EOF
      SUPABASE_URL=$SUPABASE_URL
      SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
      EOF
  build_stamp: &build_stamp
    name: Timestamp de versión (hora México, estilo sozu-admin)
    script: |
      echo "BUILD_TIMESTAMP=$(TZ=America/Mexico_City date +%y%m%d.%H%M)" >> $CM_ENV

workflows:
  android-release:
    name: Android (.apk pruebas + .aab Play Store)
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      vars:
        <<: *supabase_env
      android_signing:
        - sozu_keystore
      flutter: stable
    scripts:
      - *env_setup
      - *build_stamp
      - name: Dependencias y análisis
        script: |
          flutter pub get
          flutter analyze
      - name: Build APK (pruebas en dispositivo)
        script: |
          flutter build apk --release \
            --dart-define=BUILD_TIMESTAMP=$BUILD_TIMESTAMP \
            --dart-define=APP_ENV=prod
      - name: Build AAB (Google Play)
        script: |
          flutter build appbundle --release \
            --dart-define=BUILD_TIMESTAMP=$BUILD_TIMESTAMP \
            --dart-define=APP_ENV=prod
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
    # Publicación automática a Google Play: descomentar cuando exista el
    # service account (Google Play Console → API access).
    # publishing:
    #   google_play:
    #     credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
    #     track: internal

  ios-release:
    name: iOS (.ipa TestFlight/App Store)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: sozu_app_store_connect
    environment:
      vars:
        <<: *supabase_env
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sozu.sozuClienteApp
      flutter: stable
    scripts:
      - *env_setup
      - *build_stamp
      - name: Dependencias y análisis
        script: |
          flutter pub get
          flutter analyze
      - name: Build IPA firmado
        script: |
          flutter build ipa --release \
            --dart-define=BUILD_TIMESTAMP=$BUILD_TIMESTAMP \
            --dart-define=APP_ENV=prod \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  web-release:
    name: Web (build estático para hosting)
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      vars:
        <<: *supabase_env
      flutter: stable
    scripts:
      - *env_setup
      - *build_stamp
      - name: Dependencias y análisis
        script: |
          flutter pub get
          flutter analyze
      - name: Build web
        script: |
          flutter build web --release \
            --dart-define=BUILD_TIMESTAMP=$BUILD_TIMESTAMP \
            --dart-define=APP_ENV=prod
      - name: Empaquetar
        script: |
          cd build/web && zip -r ../web-release.zip .
    artifacts:
      - build/web-release.zip
