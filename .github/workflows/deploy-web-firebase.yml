name: Deploy Web a Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # El notify de PROD necesita HEAD^1 (tip anterior de main) para
          # listar a TODOS los autores de PRs del release; depth 1 lo rompe.
          fetch-depth: 2

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Valores públicos por diseño (URL + anon key van embebidos en cualquier
      # app cliente). NUNCA poner aquí service_role ni credenciales de BD.
      - name: Crear assets/env
        run: |
          mkdir -p assets
          cat > assets/env <<EOF
          SUPABASE_URL=https://tzmhgfjmddkfyffkkmto.supabase.co
          SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6bWhnZmptZGRrZnlmZmtrbXRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTczNTU0NDUsImV4cCI6MjA3MjkzMTQ0NX0.8DaFtWO6zyJg14jFo_Zm2idYKwI-mvfmUtlixG2JDSE
          EOF

      - name: Build web (versión con hora de México)
        run: |
          BUILD_TIMESTAMP=$(TZ=America/Mexico_City date +%y%m%d.%H%M)
          flutter pub get
          flutter analyze
          flutter build web --release --dart-define=BUILD_TIMESTAMP=$BUILD_TIMESTAMP --dart-define=APP_ENV=prod

      - name: Deploy a Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SOZU_CLIENTE_PRD }}
          projectId: sozu-admin-prd
          channelId: live

      # --- Notificación WhatsApp (mismo sistema que sozu-admin) -------------
      # Requiere el secret FIREBASE_GCP_DEV (service account con lectura de
      # Firestore sozu-admin-dev, donde viven los teléfonos de contributors).
      - name: Autenticar a Google Cloud (Firestore dev)
        if: always()
        continue-on-error: true
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_GCP_DEV }}

      - name: Configurar gcloud (notify)
        if: always()
        continue-on-error: true
        uses: google-github-actions/setup-gcloud@v2

      - name: Notificar deploy listo (WhatsApp)
        if: always()
        continue-on-error: true
        env:
          ENVIRONMENT: PROD
          STATUS: ${{ job.status }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FIRESTORE_PROJECT: sozu-admin-dev
          N8N_WEBHOOK: https://automatizacion-n8n.fbqqbe.easypanel.host/webhook/manda_notificacion
          N8N_APIKEY: 80FA62E3FD0C-4477-8B31-8A2CD6AF7B57
        run: bash ci/notify-deploy.sh
