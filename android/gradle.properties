# app en Google Play. Cámbialo aquí si el proyecto usa otro package; el
# build.gradle.kts lo lee de esta propiedad. Debe coincidir con el package
# esperado en Play Console y con ANDROID_PACKAGE_NAME de codemagic.yaml.
sozu.applicationId=com.sozu.clientes_app
